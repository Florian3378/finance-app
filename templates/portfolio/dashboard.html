{% extends 'base.html' %}

{% block title %}Dashboard — FinanceApp{% endblock %}

{% block content %}
<h2 class="mb-4">Bonjour, {{ user.username }} 👋</h2>
<div class="row">
    <div class="col-md-4">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-wallet2"></i> Valeur du portefeuille</h5>
                <h2 class="card-text">— €</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success mb-3">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-graph-up"></i> Performance</h5>
                <h2 class="card-text">— %</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-info mb-3">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-collection"></i> Positions</h5>
                <h2 class="card-text">0</h2>
            </div>
        </div>
    </div>
</div>
<p class="text-muted mt-3">Le portefeuille sera alimenté dans la prochaine étape. 🚀</p>
{% endblock %}
