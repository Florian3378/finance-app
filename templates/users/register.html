{% extends 'base.html' %}

{% block title %}Inscription — FinanceApp{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Créer un compte</h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success w-100">Créer mon compte</button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Déjà un compte ? <a href="{% url 'login' %}">Se connecter</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
