{% extends 'base_auth.html' %}
{% load static %}
{% block title %}Connexion — Fundalyze{% endblock %}

{% block content %}
<div style="width:100%;max-width:400px;padding:0 16px;">
    <div class="card">
        <div class="card-body p-4">
            <h3 style="font-size:22px;font-weight:600;color:#1B2A4A;margin-bottom:8px;">Fundalyze</h3>
            <p style="color:#9CA3AF;font-size:13px;margin-bottom:24px;">Connecte-toi à ton espace</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                {% if form.errors %}
                    <div class="alert alert-danger">Identifiants incorrects.</div>
                {% endif %}
                <button type="submit" class="btn btn-primary w-100">Se connecter</button>
            </form>
            <hr style="margin:20px 0;border-color:rgba(0,0,0,0.08);">
            <p style="text-align:center;font-size:13px;color:#9CA3AF;margin:0;">
                Pas encore de compte ?
                <a href="{% url 'register' %}" style="color:#2E6BE6;">S'inscrire</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
